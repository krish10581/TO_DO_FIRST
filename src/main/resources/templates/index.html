<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Todo App</h1>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/add}" th:object="${task}" method="post">
                <div class="mb-3">
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Task title" required />
                </div>
                <div class="mb-3">
                    <textarea th:field="*{description}" class="form-control" placeholder="Description (optional)"></textarea>
                </div>
                <button class="btn btn-primary">Add Task</button>
            </form>
        </div>
    </div>

    <div class="list-group">
        <div th:each="t : ${tasks}" class="list-group-item d-flex justify-content-between align-items-start">
            <div>
                <form th:action="@{/toggle/{id}(id=${t.id})}" method="post" style="display:inline;">
                    <button class="btn btn-sm" th:classappend="${t.completed} ? 'btn-success' : 'btn-outline-secondary'" type="submit">✓</button>
                </form>
                <strong th:text="${t.title}" th:classappend="${t.completed} ? ' text-decoration-line-through' : ''"></strong>
                <div class="text-muted" th:text="${t.description}"></div>
            </div>
            <div>
                <a th:href="@{/edit/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary me-2">Edit</a>
                <a th:href="@{/delete/{id}(id=${t.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete task?');">Delete</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
