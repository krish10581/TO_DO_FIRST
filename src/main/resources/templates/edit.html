<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Edit Task</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/update/{id}(id=${task.id})}" th:object="${task}" method="post">
                <div class="mb-3">
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Task title" required />
                </div>
                <div class="mb-3">
                    <textarea th:field="*{description}" class="form-control" placeholder="Description (optional)"></textarea>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" th:field="*{completed}" id="completed">
                    <label class="form-check-label" for="completed">Completed</label>
                </div>
                <button class="btn btn-primary">Save</button>
                <a th:href="@{/}" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
